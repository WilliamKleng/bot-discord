<!DOCTYPE html>
<html>
<head>
    <title>Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="container mx-auto py-10 max-w-6xl">
        <h1 class="text-3xl font-bold mb-8 text-center">Tus Servidores</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {% for g in guilds %}
            <div class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700 flex flex-col justify-between">
                
                <div class="flex items-center mb-6">
                    {% if g.icon %}
                    <img src="https://cdn.discordapp.com/icons/{{ g.id }}/{{ g.icon }}.png" class="w-12 h-12 rounded-full mr-4">
                    {% else %}
                    <div class="w-12 h-12 bg-gray-600 rounded-full mr-4 flex items-center justify-center font-bold">{{ g.name[0] }}</div>
                    {% endif %}
                    <h2 class="text-xl font-semibold truncate" title="{{ g.name }}">{{ g.name }}</h2>
                </div>

                <div class="flex flex-col gap-3 mt-auto">
                    <a href="{{ g.invite_url }}" target="_blank" class="block text-center bg-green-600 hover:bg-green-700 py-2 rounded font-bold transition">
                        ➕ Invitar Bot
                    </a>
                    
                    <a href="/config/{{ g.id }}" class="block text-center bg-blue-600 hover:bg-blue-700 py-2 rounded font-bold transition">
                        ⚙️ Configurar
                    </a>
                </div>

            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
