<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s ease; border-color: #3b82f6; }
    </style>
</head>
<body class="text-slate-200 min-h-screen">
    <div class="container mx-auto py-12 px-4 max-w-6xl">
        <header class="text-center mb-16">
            <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">Tus Servidores</h1>
            <p class="text-slate-400">Seleccioná un servidor para gestionar la configuración del bot.</p>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            {% for g in guilds %}
            <div class="glass p-6 rounded-2xl card-hover flex flex-col justify-between shadow-2xl">
                <div class="flex items-center space-x-4 mb-8">
                    {% if g.icon %}
                    <img src="https://cdn.discordapp.com/icons/{{ g.id }}/{{ g.icon }}.png" class="w-16 h-16 rounded-2xl shadow-lg border-2 border-slate-700">
                    {% else %}
                    <div class="w-16 h-16 bg-gradient-to-br from-slate-700 to-slate-800 rounded-2xl flex items-center justify-center text-2xl font-bold border-2 border-slate-600">
                        {{ g.name[0] }}
                    </div>
                    {% endif %}
                    <h2 class="text-xl font-bold text-white truncate w-40">{{ g.name }}</h2>
                </div>

                <div class="space-y-3">
                    <a href="{{ g.invite_url }}" target="_blank" 
                       class="flex items-center justify-center w-full py-3 px-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold transition-all duration-200 shadow-lg shadow-emerald-900/20">
                        <span class="mr-2">➕</span> Invitar Bot
                    </a>
                    
                    <a href="/config/{{ g.id }}" 
                       class="flex items-center justify-center w-full py-3 px-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold transition-all duration-200 shadow-lg shadow-blue-900/20">
                        <span class="mr-2">⚙️</span> Configurar
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
