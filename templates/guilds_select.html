<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Servidores — GestiónBot</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body style="background:#0a0c10; min-height:100vh;">
    <div class="guilds-wrap">
        <h1 class="guilds-title">Tus servidores</h1>
        <p class="guilds-sub">Seleccioná un servidor donde tenés permisos de administrador.</p>
        <div class="guilds-grid">
            {% for g in guilds %}
            <div class="guild-card-item">
                <div class="guild-card-top">
                    <div class="guild-card-icon">
                        {% if g.icon %}
                            <img src="https://cdn.discordapp.com/icons/{{ g.id }}/{{ g.icon }}.png" alt="{{ g.name }}">
                        {% else %}
                            {{ g.name[0] }}
                        {% endif %}
                    </div>
                    <div>
                        <div class="guild-card-name">{{ g.name }}</div>
                    </div>
                </div>
                <div class="guild-card-actions">
                    <a href="{{ g.dashboard_url }}" class="btn btn-primary">Administrar</a>
                    <a href="{{ g.invite_url }}" target="_blank" class="btn">+ Invitar bot</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
