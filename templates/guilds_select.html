<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Servidores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body class="p-8 md:p-20">
    <div class="grid-bg"></div>
    <div class="max-w-6xl mx-auto">
        <div class="mb-16">
            <h1 class="text-4xl font-bold mb-2">Selecciona un Servidor</h1>
            <p class="text-slate-500">Servidores donde tienes permisos de Administrador.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            {% for g in guilds %}
            <div class="glass-card p-8">
                <div class="flex items-center gap-4 mb-8">
                    {% if g.icon %}
                    <img src="https://cdn.discordapp.com/icons/{{ g.id }}/{{ g.icon }}.png" class="w-16 h-16 rounded-2xl" alt="{{ g.name }}">
                    {% else %}
                    <div class="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center font-bold text-xl">{{ g.name[0] }}</div>
                    {% endif %}
                    <h2 class="text-xl font-bold truncate">{{ g.name }}</h2>
                </div>

                <div class="flex flex-col gap-3">
                    <a href="{{ g.dashboard_url }}" class="btn-primary">Administrar</a>
                    <a href="{{ g.invite_url }}" class="text-sm text-slate-400 hover:text-white transition-colors text-center">Invitar Bot</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
