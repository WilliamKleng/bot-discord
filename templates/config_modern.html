<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ajustes | {{ guild_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body class="flex min-h-screen">
    <aside class="sidebar w-72 p-8 hidden md:flex flex-col">
        <nav class="space-y-4">
            <a href="/dashboard/{{ guild_id }}" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-900 transition-all">📊 Estadísticas</a>
            <a href="#" class="flex items-center gap-3 p-3 rounded-xl bg-slate-900 border-r-4 border-blue-500">⚙️ Configuración</a>
        </nav>
    </aside>

    <main class="flex-1 p-8 md:p-16">
        <div class="max-w-2xl glass-card p-10">
            <h2 class="text-2xl font-bold mb-8">Ajustes del Servidor</h2>
            <form action="/dashboard/{{ guild_id }}/save" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-2 uppercase">Canal de Bienvenida</label>
                    <input type="text" name="welcome_channel" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none" placeholder="ID del canal">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-400 mb-2 uppercase">Mensaje de Bienvenida</label>
                    <textarea name="welcome_msg" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none"></textarea>
                </div>
                <button type="submit" class="w-full btn-primary py-4">Guardar Cambios</button>
            </form>
        </div>
    </main>
</body>
</html>
