<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Config | {{ guild_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b1120] text-white flex min-h-screen">
    <aside class="w-64 border-r border-slate-800 p-6 flex flex-col justify-between bg-slate-900/20">
        <div>
            <div class="font-bold text-xl mb-10 border-b border-slate-800 pb-4">{{ guild_name }}</div>
            <nav class="space-y-2">
                <a href="/dashboard/{{ guild_id }}" class="flex p-3 rounded-lg text-slate-400">📊 Dashboard</a>
                <a href="/dashboard/{{ guild_id }}/config" class="bg-blue-600/10 text-blue-400 border-l-3 border-blue-600 flex p-3 rounded-lg">⚙️ Configuración</a>
            </nav>
        </div>
    </aside>
    <main class="flex-1 p-10 flex justify-center">
        <div class="max-w-xl w-full">
            <h2 class="text-3xl font-bold mb-8">Ajustes</h2>
            {% if request.query_params.success %}<p class="bg-emerald-500/10 text-emerald-400 p-3 rounded-lg mb-4 text-center">✅ Guardado</p>{% endif %}
            <form action="/dashboard/{{ guild_id }}/config" method="POST" class="bg-slate-900/50 p-10 rounded-3xl border border-slate-800 space-y-6">
                <div>
                    <label class="block text-sm text-slate-400 mb-2">CANAL DE BIENVENIDA (ID)</label>
                    <input type="text" name="welcome_channel_id" value="{{ welcome_channel_id }}" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">ROL AUTOMÁTICO (ID)</label>
                    <input type="text" name="auto_role_id" value="{{ auto_role_id }}" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-500">Guardar Cambios</button>
            </form>
        </div>
    </main>
</body>
</html>
