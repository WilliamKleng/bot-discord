<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Discord | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0b1120 0%, #1e293b 100%); font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255,255,255,0.08);
        }
        .discord-btn {
            background: linear-gradient(90deg, #5865F2 60%, #4752C4 100%);
        }
        .discord-btn:hover {
            background: linear-gradient(90deg, #4752C4 60%, #5865F2 100%);
        }
        .spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-white">
    <div class="glass max-w-md w-full mx-auto p-10 rounded-3xl text-center border border-slate-800 shadow-2xl">
        <div class="flex flex-col items-center mb-8">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" alt="Bot Logo" class="w-16 h-16 rounded-2xl shadow-lg mb-3">
            <h1 class="text-4xl font-extrabold mb-2 tracking-tight">Panel Discord</h1>
            <p class="text-slate-400 mb-2 text-base">Gestioná tus comunidades de Discord con un solo clic.</p>
        </div>
        <a href="{{ discord_auth_url }}"
           class="discord-btn flex items-center justify-center gap-3 py-4 px-8 rounded-2xl font-bold text-lg transition-all shadow-lg shadow-blue-900/40 mb-2 group relative overflow-hidden">
            <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276c-.598.3428-1.2205.6447-1.8733.8923a.0766.0766 0 00-.0406.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1835 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.4189 0 1.3333-.9555 2.419-2.1569 2.419zm7.9748 0c-1.1836 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.4189 0 1.3333-.946 2.419-2.1568 2.419Z"/></svg>
            <span>Login con Discord</span>
            <span class="absolute right-4 opacity-0 group-hover:opacity-100 transition-all spin">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
            </span>
        </a>
        <p class="text-xs text-slate-500 mt-4">Nunca compartiremos tus datos de Discord.</p>
        {% if error %}
        <div class="mt-6 bg-red-500/10 border border-red-500/40 text-red-400 p-3 rounded-xl animate-pulse">
            {{ error }}
        </div>
        {% endif %}
    </div>
</body>
</html>
