<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido | Panel Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="grid-bg"></div>
    
    <div class="max-w-md w-full p-8 text-center relative z-10">
        <div class="mb-8 inline-flex p-4 rounded-3xl bg-blue-500/10 border border-blue-500/20">
            <span class="text-4xl">⚡</span>
        </div>
        
        <h1 class="text-5xl font-extrabold mb-4 tracking-tight">Tu Bot, <span class="text-blue-500">Simplificado.</span></h1>
        <p class="text-slate-400 text-lg mb-10">La forma más rápida de gestionar tu comunidad de Discord.</p>
        
        <a href="{{ discord_auth_url }}" class="flex items-center justify-center gap-3 w-full py-4 bg-white text-black font-bold rounded-2xl hover:scale-[1.02] transition-transform shadow-xl">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" class="w-6 h-6" alt="Discord">
            Entrar con Discord
        </a>
    </div>

</html>
