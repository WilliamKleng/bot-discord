<!DOCTYPE html>
<html>
<head>
    <title>Configurar Servidor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="container mx-auto py-10 max-w-lg">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-bold">Ajustes del Servidor</h1>
            <a href="javascript:history.back()" class="text-gray-400 hover:text-white transition">Volver</a>
        </div>

        {% if mensaje %}
        <div class="bg-green-600/20 border border-green-500 text-green-400 p-4 rounded mb-6 text-center font-semibold">
            {{ mensaje }}
        </div>
        {% endif %}

        <form action="/config/{{ guild_id }}" method="POST" class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
            
            <div class="mb-6">
                <label class="block text-gray-300 text-sm font-bold mb-2">ID del Canal de Bienvenida</label>
                <input type="text" name="welcome_channel_id" value="{{ welcome_channel_id }}" placeholder="Ej: 123456789012345678" class="shadow appearance-none border border-gray-600 rounded w-full py-3 px-4 bg-gray-700 text-white leading-tight focus:outline-none focus:border-blue-500 transition">
                <p class="text-xs text-gray-500 mt-2">Hacé clic derecho en un canal en Discord y seleccioná "Copiar ID de canal".</p>
            </div>

            <div class="mb-6">
                <label class="block text-gray-300 text-sm font-bold mb-2">ID del Rol Automático (Nivel 5)</label>
                <input type="text" name="auto_role_id" value="{{ auto_role_id }}" placeholder="Ej: 987654321098765432" class="shadow appearance-none border border-gray-600 rounded w-full py-3 px-4 bg-gray-700 text-white leading-tight focus:outline-none focus:border-blue-500 transition">
                <p class="text-xs text-gray-500 mt-2">El ID del rol que el bot asignará al llegar al nivel configurado.</p>
            </div>

            <div class="flex items-center justify-end">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded focus:outline-none focus:shadow-outline transition">
                    Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</body>
</html>
