<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel | {{ guild_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body class="flex min-h-screen">
    <aside class="sidebar w-72 p-8 hidden md:flex flex-col">
        <div class="mb-10 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white uppercase">{{ guild_name[0] }}</div>
            <span class="font-bold truncate">{{ guild_name }}</span>
        </div>

        <nav class="space-y-4">
            <a href="/dashboard/{{ guild_id }}" class="flex items-center gap-3 p-3 rounded-xl bg-slate-900 border-r-4 border-blue-500">📊 Estadísticas</a>
            <a href="/dashboard/{{ guild_id }}/config" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-900 transition-all">⚙️ Configuración</a>
        </nav>

        <a href="/callback" class="mt-auto text-sm text-slate-500 hover:text-white">← Volver</a>
    </aside>

    <main class="flex-1 p-8 md:p-16">
        <header class="mb-12">
            <h1 class="text-3xl font-bold">Vista General</h1>
            <p class="text-slate-500 italic">Datos actuales de {{ guild_name }}</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass-card p-8">
                <span class="text-blue-500 font-bold uppercase text-xs tracking-widest">Miembros</span>
                <p class="text-5xl font-black mt-2">{{ total_members }}</p>
            </div>
            <div class="glass-card p-8">
                <span class="text-emerald-500 font-bold uppercase text-xs tracking-widest">Usuarios en Ranking</span>
                <p class="text-5xl font-black mt-2">{{ total_ranked }}</p>
            </div>
            <div class="glass-card p-8">
                <span class="text-red-500 font-bold uppercase text-xs tracking-widest">Advertencias</span>
                <p class="text-5xl font-black mt-2">{{ total_warns }}</p>
            </div>
        </div>
    </main>
</body>
</html>
